<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Jason Yeh Studio</title>
  <meta name="description" content="Photography portfolio of Jason Yeh." />

  <link rel="icon" type="image/svg+xml" href="faviconcircle.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Josefin+Slab:wght@600;700&family=Raleway:wght@400;500;600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="site-header">
    <a class="brand" href="/">Jason Yeh</a>

    <nav>
      <a href="/#gallery" data-scroll-target="gallery">Gallery</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <main>
    <!-- HOME -->
    <section id="home" class="home">
      <section class="home-photo">
        <img src="images.jpg" alt="Jason Yeh with camera" />
      </section>

      <section class="home-intro">
        <h1>Visual Storyteller</h1>
        <p class="intro-text">
          Snapshots of people, plaecs, and moments in time
        </p>
      </section>
    </section>

    <!-- GALLERY -->
    <section id="portfolio" class="portfolio-section">

      <div id="gallery" class="portfolio-grid">
        <a class="tile" href="portraits.html">
          <img src="images/portrait-cover.jpg" alt="Portrait photography by Jason Yeh" />
          <div class="haze"></div>
          <h3>Portraits</h3>
        </a>

        <a class="tile" href="graduation.html">
          <img src="images/graduation-cover.jpg" alt="Graduation photography by Jason Yeh" />
          <div class="haze"></div>
          <h3>Graduation</h3>
        </a>

        <a class="tile" href="motion.html">
          <img class="motion-cover" src="images/action-cover.jpg" alt="Motion photography by Jason Yeh" />
          <div class="haze"></div>
          <h3>Motion</h3>
        </a>

        <a class="tile" href="studies.html">
          <img src="images/studies-cover.jpg" alt="Visual studies by Jason Yeh" />
          <div class="haze"></div>
          <h3>Studies</h3>
        </a>

        <a class="tile" href="places.html">
          <img src="images/places-cover.jpg" alt="Landscape photography by Jason Yeh" />
          <div class="haze"></div>
          <h3>Places</h3>
        </a>
      </div>
    </section>

    <!-- CONTACT -->
<section id="contact" class="contact-section">
  <p class="contact-note">For portraits, graduation sessions, or creative work:</p>

  <div class="contact-bottom">
    <p class="copyright">© 2026 Jason Yeh</p>

    <div class="contact-links">
      <a href="mailto:jasonyehlv@gmail.com">jasonyehlv@gmail.com</a>
      <a href="https://instagram.com/jasonyeh.jpg" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>
</section>
  </main>
  <script>
  window.addEventListener("load", function () {
    const navEntry = performance.getEntriesByType("navigation")[0];
    const isReload = navEntry && navEntry.type === "reload";

    if (isReload && window.location.hash) {
      history.replaceState(null, "", "/");
      window.scrollTo(0, 0);
    }
  });
</script>
</body>
</html>
